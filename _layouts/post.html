---
layout: default
---

<article class="post">
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }} • {{ page.categories | join: ", " }}</p>

  <h1>{{ page.title }}</h1>

  {% if page.subtitle %}
  <p class="subtitle">{{ page.subtitle }}</p>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
